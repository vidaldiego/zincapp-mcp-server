name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for npm trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Node 24 LTS ships npm 11.x, which already supports OIDC trusted publishing +
          # provenance. We deliberately do NOT `npm install -g npm@latest`: npm@12.0.0 ships a
          # broken provenance path (Cannot find module 'sigstore' / MODULE_NOT_FOUND), which
          # failed the publish. The bundled npm 11.x is stable for --provenance.
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - run: npm run build

      - name: Publish to npm (Trusted Publishing via OIDC)
        run: npm publish --access public --provenance
